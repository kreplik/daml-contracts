name: daml-tests

# Runs the Daml Script unit tests through `dpm trace test` on every push/PR.
# The command returns a non-zero exit code when any test fails, so it gates CI
# directly, and it maps failed tests back to source in the job log.

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Daml SDK
        run: |
          curl -sSL https://get.daml.com/ | sh -s 3.4.11
          echo "$HOME/.daml/bin" >> "$GITHUB_PATH"

      - name: Get dpm-trace
        run: git clone --depth 1 https://github.com/walnuthq/dpm-trace.git "$RUNNER_TEMP/dpm-trace"

      - name: Run Daml Script unit tests (dpm trace test)
        run: |
          PYTHONPATH="$RUNNER_TEMP/dpm-trace/src" python3 -m dpm_trace.cli test . \
            --daml daml \
            --dar .daml/dist/asset-tests-1.0.0.dar \
            --junit dpm-trace-results.xml \
            --no-trees \
            --color always

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dpm-trace-results
          path: dpm-trace-results.xml
